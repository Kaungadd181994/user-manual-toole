name: Extract Uploaded ZIP File

on:
  push:
    branches:
      - main
      - master
    paths:
      - "*.zip"

jobs:
  extract:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Locate and Extract ZIP
        run: |
          # Find the first zip file in the root
          ZIP_FILE=$(find . -maxdepth 1 -name "*.zip" | head -n 1)
          
          if [ -z "$ZIP_FILE" ]; then
            echo "No zip file found in root. Skipping."
            exit 0
          fi
          
          echo "Found zip archive: $ZIP_FILE"
          
          # Extract zip directly into root, overwriting existing files
          unzip -o "$ZIP_FILE" -d .
          
          # Remove the zip file
          rm "$ZIP_FILE"
          echo "Extracted and deleted $ZIP_FILE successfully."
