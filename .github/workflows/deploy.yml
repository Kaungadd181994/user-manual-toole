name: Extract Uploaded ZIP File

on:
  push:
    branches:
      - main
      - master
    paths:
      - "*.zip"

permissions:
  contents: write

jobs:
  extract:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Locate and Extract ZIP
        run: |
          # Find the first zip file in the root
          ZIP_FILE=$(find . -maxdepth 1 -name "*.zip" | head -n 1)
          
          if [ -z "$ZIP_FILE" ]; then
            echo "No zip file found in root. Skipping."
            exit 0
          fi
          
          echo "Found zip archive: $ZIP_FILE"
          
          # Extract zip directly into root, overwriting existing files
          unzip -o "$ZIP_FILE" -d .
          
          # Remove the zip file
          rm "$ZIP_FILE"
          echo "Extracted and deleted $ZIP_FILE successfully."

      - name: Commit and Push changes
        run: |
          git config --global user.name "github-actions[bot]"
          git config --global user.email "github-actions[bot]@users.noreply.github.com"
          
          git add -A
          
          # Check if there are any changes to commit
          if git diff-index --quiet HEAD --; then
            echo "No files modified or added. Nothing to commit."
          else
            git commit -m "chore: auto-extract uploaded zip and clean up archive"
            git push origin HEAD
            echo "Changes pushed successfully!"
          fi
